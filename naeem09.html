<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Interactive CRUD Dashboard</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #eef2f7;
  margin: 0;
}

header {
  background: #4a90e2;
  color: white;
  padding: 15px;
  text-align: center;
}

.container {
  max-width: 1000px;
  margin: 20px auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}

form {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

input {
  padding: 10px;
  flex: 1;
}

button {
  padding: 10px;
  border: none;
  cursor: pointer;
  border-radius: 5px;
}

.primary { background: #4a90e2; color: white; }
.edit { background: orange; color: white; }
.delete { background: red; color: white; }

.search-box {
  margin-bottom: 15px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #ddd;
}

th {
  background: #4a90e2;
  color: white;
}

tr:hover {
  background: #f1f1f1;
}

/* Modal */
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
}

.modal-content {
  background: white;
  padding: 20px;
  margin: 10% auto;
  width: 300px;
  border-radius: 10px;
}

.alert {
  padding: 10px;
  margin-bottom: 10px;
  background: #d4edda;
  color: #155724;
  display: none;
}
</style>

</head>
<body>

<header>
    <h1>NAEEM  KHAN    24CA2050</h1>
  <h2> User Dashboard</h2>
</header>

<div class="container">

  <div class="alert" id="alertBox">Action successful!</div>

  <!-- Create Form -->
  <form id="userForm">
    <input type="text" id="name" placeholder="Name" required>
    <input type="email" id="email" placeholder="Email" required>
    <button class="primary">Add User</button>
  </form>

  <!-- Search -->
  <input class="search-box" type="text" id="search" placeholder="Search users...">

  <!-- Table -->
  <table>
    <thead>
      <tr>
        <th>ID</th><th>Name</th><th>Email</th><th>Actions</th>
      </tr>
    </thead>
    <tbody id="userTable"></tbody>
  </table>

</div>

<!-- Modal -->
<div class="modal" id="editModal">
  <div class="modal-content">
    <h3>Edit User</h3>
    <input type="text" id="editName"><br><br>
    <input type="email" id="editEmail"><br><br>
    <button class="primary" onclick="updateUser()">Update</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>
const API = "https://jsonplaceholder.typicode.com/users";

let usersData = [];
let currentEditId = null;

// Fetch users
async function loadUsers() {
  const res = await fetch(API);
  usersData = await res.json();
  render(usersData);
}

// Render table
function render(data) {
  const table = document.getElementById("userTable");
  table.innerHTML = "";

  data.forEach(user => {
    table.innerHTML += `
      <tr>
        <td>${user.id}</td>
        <td>${user.name}</td>
        <td>${user.email}</td>
        <td>
          <button class="edit" onclick="openEdit(${user.id})">Edit</button>
          <button class="delete" onclick="deleteUser(${user.id})">Delete</button>
        </td>
      </tr>
    `;
  });
}

// Create user
document.getElementById("userForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;

  await fetch(API, {
    method: "POST",
    body: JSON.stringify({ name, email }),
    headers: { "Content-Type": "application/json" }
  });

  showAlert();
  e.target.reset();
  loadUsers();
});

// Delete user
async function deleteUser(id) {
  await fetch(`${API}/${id}`, { method: "DELETE" });
  showAlert();
  loadUsers();
}

// Open edit modal
function openEdit(id) {
  const user = usersData.find(u => u.id === id);
  currentEditId = id;

  document.getElementById("editName").value = user.name;
  document.getElementById("editEmail").value = user.email;

  document.getElementById("editModal").style.display = "block";
}

// Update user
async function updateUser() {
  const name = document.getElementById("editName").value;
  const email = document.getElementById("editEmail").value;

  await fetch(`${API}/${currentEditId}`, {
    method: "PUT",
    body: JSON.stringify({ name, email }),
    headers: { "Content-Type": "application/json" }
  });

  closeModal();
  showAlert();
  loadUsers();
}

// Close modal
function closeModal() {
  document.getElementById("editModal").style.display = "none";
}

// Search filter
document.getElementById("search").addEventListener("input", (e) => {
  const value = e.target.value.toLowerCase();
  const filtered = usersData.filter(u =>
    u.name.toLowerCase().includes(value)
  );
  render(filtered);
});

// Alert
function showAlert() {
  const alert = document.getElementById("alertBox");
  alert.style.display = "block";
  setTimeout(() => alert.style.display = "none", 2000);
}

// Init
loadUsers();
</script>

</body>
</html>
